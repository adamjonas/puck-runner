<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Endless runner hockey game controlled by a real puck or tennis ball tracked by your iPhone camera" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="Puck Runner" />
  <meta property="og:description" content="Dodge obstacles, collect coins, deke for style — controlled by a real puck on your floor" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Puck Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { display: block; }
    #debug {
      position: fixed;
      top: 12px;
      left: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      font-family: 'SF Mono', 'Menlo', monospace;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
    }
    #status {
      position: fixed;
      top: 12px;
      right: 12px;
      font-size: 13px;
      font-family: 'SF Mono', 'Menlo', monospace;
      pointer-events: none;
      z-index: 10;
    }
    .connected { color: #2ecc71; }
    .disconnected { color: #e74c3c; }
    .waiting { color: #f39c12; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="debug"></div>
  <div id="status"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
